<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Armold - Robot Arm Controller</title>
    <script src="https://cdn.jsdelivr.net/npm/roslib@1/build/roslib.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2rem;
            color: #00d4ff;
            margin-bottom: 5px;
        }

        header p {
            color: #888;
            font-size: 0.9rem;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #16213e;
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff4444;
        }

        .status-dot.connected {
            background: #44ff44;
        }

        .motor-toggle {
            padding: 8px 20px;
            border: none;
            border-radius: 5px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .motor-toggle.enable {
            background: #2ecc71;
            color: #fff;
        }

        .motor-toggle.disable {
            background: #e74c3c;
            color: #fff;
        }

        .motor-toggle:hover {
            opacity: 0.85;
            transform: scale(1.02);
        }

        .joint-panel {
            background: #16213e;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .joint-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .joint-header h3 {
            color: #00d4ff;
            font-size: 1.1rem;
        }

        .joint-position {
            font-family: 'Courier New', monospace;
            font-size: 1.2rem;
            color: #fff;
            background: #0f3460;
            padding: 4px 12px;
            border-radius: 4px;
        }

        .joint-degrees {
            font-family: 'Courier New', monospace;
            font-size: 1.1rem;
            color: #00d4ff;
            margin-left: 8px;
        }

        .joint-controls {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .jog-btn {
            padding: 10px 16px;
            border: 1px solid #334;
            border-radius: 6px;
            background: #0f3460;
            color: #fff;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            min-width: 60px;
            text-align: center;
        }

        .jog-btn:hover {
            background: #1a4a80;
            border-color: #00d4ff;
        }

        .jog-btn:active {
            background: #00d4ff;
            color: #000;
        }

        .jog-btn.negative {
            border-color: #553;
        }

        .jog-btn.home {
            background: #2c3e50;
            border-color: #666;
        }

        .jog-btn.home:hover {
            background: #34495e;
        }

        .spacer {
            width: 10px;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 10px 20px;
            border: 1px solid #334;
            border-radius: 6px;
            background: #16213e;
            color: #ccc;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.15s;
        }

        .action-btn:hover {
            background: #1a3050;
            border-color: #00d4ff;
            color: #fff;
        }

        .action-btn.demo-btn {
            background: #1a4a2e;
            border-color: #2ecc71;
            color: #2ecc71;
        }

        .action-btn.demo-btn:hover {
            background: #2ecc71;
            color: #000;
        }

        .action-btn.demo-btn.running {
            background: #f39c12;
            border-color: #f39c12;
            color: #000;
            cursor: not-allowed;
        }

        .estop-btn {
            padding: 12px 30px;
            border: 2px solid #e74c3c;
            border-radius: 6px;
            background: #e74c3c;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.1s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .estop-btn:hover {
            background: #c0392b;
            transform: scale(1.05);
        }

        .estop-btn:active {
            background: #922b21;
            transform: scale(0.98);
        }

        .connection-form {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 20px;
            background: #16213e;
            padding: 12px 20px;
            border-radius: 8px;
        }

        .connection-form input {
            background: #0f3460;
            border: 1px solid #334;
            color: #fff;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 0.9rem;
            width: 250px;
        }

        .connection-form button {
            padding: 8px 16px;
            background: #00d4ff;
            color: #000;
            border: none;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
        }

        .speed-control {
            background: #16213e;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .speed-control h3 {
            color: #00d4ff;
            margin-bottom: 10px;
        }

        .speed-slider {
            width: 100%;
            margin: 10px 0;
        }

        .speed-value {
            font-family: 'Courier New', monospace;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Armold</h1>
            <p>Six-Axis Robot Arm Controller</p>
        </header>

        <div class="connection-form">
            <label for="ros-url">ROS Bridge:</label>
            <input type="text" id="ros-url" value="ws://192.168.1.138:9090">
            <button onclick="connect()">Connect</button>
        </div>

        <div class="status-bar">
            <div class="status-indicator">
                <div class="status-dot" id="conn-dot"></div>
                <span id="conn-status">Disconnected</span>
            </div>
            <button class="motor-toggle enable" id="motor-btn" onclick="toggleMotors()">
                Enable Motors
            </button>
        </div>

        <div class="joint-panel" id="joint-0-panel">
            <div class="joint-header">
                <h3>Joint 0 (Base)</h3>
                <div>
                    <span class="joint-position" id="pos-0">0</span>
                    <span class="joint-degrees" id="deg-0">0.0°</span>
                </div>
            </div>
            <div class="joint-controls">
                <button class="jog-btn negative" onclick="jog(0, -20757)">-360°</button>
                <button class="jog-btn negative" onclick="jog(0, -5189)">-90°</button>
                <button class="jog-btn negative" onclick="jog(0, -1730)">-30°</button>
                <button class="jog-btn negative" onclick="jog(0, -577)">-10°</button>
                <button class="jog-btn negative" onclick="jog(0, -58)">-1°</button>
                <div class="spacer"></div>
                <button class="jog-btn" onclick="jog(0, 58)">+1°</button>
                <button class="jog-btn" onclick="jog(0, 577)">+10°</button>
                <button class="jog-btn" onclick="jog(0, 1730)">+30°</button>
                <button class="jog-btn" onclick="jog(0, 5189)">+90°</button>
                <button class="jog-btn" onclick="jog(0, 20757)">+360°</button>
            </div>
        </div>

        <div class="joint-panel" id="joint-1-panel">
            <div class="joint-header">
                <h3>Joint 1 (Shoulder)</h3>
                <div>
                    <span class="joint-position" id="pos-1">0</span>
                    <span class="joint-degrees" id="deg-1">0.0°</span>
                </div>
            </div>
            <div class="joint-controls">
                <button class="jog-btn negative" onclick="jog(1, -20757)">-360°</button>
                <button class="jog-btn negative" onclick="jog(1, -5189)">-90°</button>
                <button class="jog-btn negative" onclick="jog(1, -1730)">-30°</button>
                <button class="jog-btn negative" onclick="jog(1, -577)">-10°</button>
                <button class="jog-btn negative" onclick="jog(1, -58)">-1°</button>
                <div class="spacer"></div>
                <button class="jog-btn" onclick="jog(1, 58)">+1°</button>
                <button class="jog-btn" onclick="jog(1, 577)">+10°</button>
                <button class="jog-btn" onclick="jog(1, 1730)">+30°</button>
                <button class="jog-btn" onclick="jog(1, 5189)">+90°</button>
                <button class="jog-btn" onclick="jog(1, 20757)">+360°</button>
            </div>
        </div>

        <div class="joint-panel" id="joint-2-panel">
            <div class="joint-header">
                <h3>Joint 2 (Elbow)</h3>
                <div>
                    <span class="joint-position" id="pos-2">0</span>
                    <span class="joint-degrees" id="deg-2">0.0°</span>
                </div>
            </div>
            <div class="joint-controls">
                <button class="jog-btn negative" onclick="jog(2, -20757)">-360°</button>
                <button class="jog-btn negative" onclick="jog(2, -5189)">-90°</button>
                <button class="jog-btn negative" onclick="jog(2, -1730)">-30°</button>
                <button class="jog-btn negative" onclick="jog(2, -577)">-10°</button>
                <button class="jog-btn negative" onclick="jog(2, -58)">-1°</button>
                <div class="spacer"></div>
                <button class="jog-btn" onclick="jog(2, 58)">+1°</button>
                <button class="jog-btn" onclick="jog(2, 577)">+10°</button>
                <button class="jog-btn" onclick="jog(2, 1730)">+30°</button>
                <button class="jog-btn" onclick="jog(2, 5189)">+90°</button>
                <button class="jog-btn" onclick="jog(2, 20757)">+360°</button>
            </div>
        </div>

        <div class="actions">
            <button class="action-btn" onclick="setHome()">Set Home (Zero All)</button>
            <button class="action-btn" onclick="goHome()">Go to Home (0,0,0)</button>
            <button class="action-btn demo-btn" onclick="runIKDemo()">Run IK Demo</button>
            <button class="estop-btn" id="estop-btn" onclick="eStop()">E-STOP</button>
        </div>
    </div>

    <script>
        let ros = null;
        let enablePub = null;
        let goalPub = null;
        let stateSub = null;
        let motorsEnabled = false;
        let currentPos = [0, 0, 0];

        const STEPS_PER_REV = 20757;  // Calibrated: 32000 steps = 555° actual
        const STEPS_PER_DEGREE = STEPS_PER_REV / 360;  // ~57.7

        function stepsToDegrees(steps) {
            return (steps / STEPS_PER_DEGREE).toFixed(1);
        }

        function updateDegreeDisplay() {
            for (let i = 0; i < 3; i++) {
                document.getElementById('deg-' + i).textContent = stepsToDegrees(currentPos[i]) + '\u00B0';
            }
        }

        function connect() {
            const url = document.getElementById('ros-url').value;

            if (ros) {
                ros.close();
            }

            ros = new ROSLIB.Ros({ url: url });

            ros.on('connection', function () {
                document.getElementById('conn-dot').classList.add('connected');
                document.getElementById('conn-status').textContent = 'Connected';
                setupTopics();
            });

            ros.on('error', function (error) {
                document.getElementById('conn-dot').classList.remove('connected');
                document.getElementById('conn-status').textContent = 'Error';
            });

            ros.on('close', function () {
                document.getElementById('conn-dot').classList.remove('connected');
                document.getElementById('conn-status').textContent = 'Disconnected';
            });
        }

        function setupTopics() {
            enablePub = new ROSLIB.Topic({
                ros: ros,
                name: '/enable_motors',
                messageType: 'std_msgs/msg/Int16'
            });

            goalPub = new ROSLIB.Topic({
                ros: ros,
                name: '/stepper_goal',
                messageType: 'std_msgs/msg/Int16MultiArray'
            });

            stateSub = new ROSLIB.Topic({
                ros: ros,
                name: '/stepper_state',
                messageType: 'std_msgs/msg/Int16MultiArray'
            });

            stateSub.subscribe(function (msg) {
                if (msg.data && msg.data.length >= 3) {
                    currentPos = [msg.data[0], msg.data[1], msg.data[2]];
                    document.getElementById('pos-0').textContent = currentPos[0];
                    document.getElementById('pos-1').textContent = currentPos[1];
                    document.getElementById('pos-2').textContent = currentPos[2];
                    updateDegreeDisplay();
                }
            });
        }

        function toggleMotors() {
            if (!ros || !ros.isConnected) return;

            motorsEnabled = !motorsEnabled;
            const btn = document.getElementById('motor-btn');

            const msg = new ROSLIB.Message({ data: motorsEnabled ? 1 : 0 });
            enablePub.publish(msg);

            if (motorsEnabled) {
                btn.textContent = 'Disable Motors';
                btn.classList.remove('enable');
                btn.classList.add('disable');
            } else {
                btn.textContent = 'Enable Motors';
                btn.classList.remove('disable');
                btn.classList.add('enable');
            }
        }

        function jog(joint, delta) {
            if (!ros || !ros.isConnected || !motorsEnabled) return;

            const target = [...currentPos];
            target[joint] += delta;

            const msg = new ROSLIB.Message({
                layout: { dim: [], data_offset: 0 },
                data: target
            });
            goalPub.publish(msg);

            // Optimistic update
            currentPos[joint] += delta;
            document.getElementById('pos-' + joint).textContent = currentPos[joint];
            updateDegreeDisplay();
        }

        function setHome() {
            if (!ros || !ros.isConnected) return;
            currentPos = [0, 0, 0];
            document.getElementById('pos-0').textContent = '0';
            document.getElementById('pos-1').textContent = '0';
            document.getElementById('pos-2').textContent = '0';
            updateDegreeDisplay();

            const msg = new ROSLIB.Message({
                layout: { dim: [], data_offset: 0 },
                data: [0, 0, 0]
            });
            goalPub.publish(msg);
        }

        function goHome() {
            if (!ros || !ros.isConnected || !motorsEnabled) return;

            const msg = new ROSLIB.Message({
                layout: { dim: [], data_offset: 0 },
                data: [0, 0, 0]
            });
            goalPub.publish(msg);
        }

        // --- E-Stop ---
        function eStop() {
            if (!ros || !ros.isConnected) return;

            // Immediately disable motors
            const msg = new ROSLIB.Message({ data: 0 });
            enablePub.publish(msg);

            motorsEnabled = false;
            demoRunning = false;

            const btn = document.getElementById('motor-btn');
            btn.textContent = 'Enable Motors';
            btn.classList.remove('disable');
            btn.classList.add('enable');

            const demoBtn = document.querySelector('.demo-btn');
            demoBtn.textContent = 'Run IK Demo';
            demoBtn.classList.remove('running');
        }

        // --- IK Demo ---
        let demoRunning = false;

        const STEPS_PER_DEG = STEPS_PER_REV / 360;

        function degToSteps(deg) {
            return Math.round(deg * STEPS_PER_DEG);
        }

        const ikSequence = [
            { j: [0, 0, 0], label: 'Home' },
            { j: [0, -135, -105], label: 'Reach down' },
            { j: [0, -165, -165], label: 'Pick position' },
            { j: [0, -105, -85], label: 'Lift' },
            { j: [90, -105, -85], label: 'Rotate to place' },
            { j: [90, -145, -125], label: 'Lower to place' },
            { j: [90, -105, -85], label: 'Retract' },
            { j: [0, 0, 0], label: 'Home' },
            { j: [-45, 105, 135], label: 'Look up left' },
            { j: [45, 105, 135], label: 'Look up right' },
            { j: [0, 0, 0], label: 'Home' },
            { j: [0, -180, -180], label: 'Deep reach' },
            { j: [180, -180, -180], label: 'Sweep 180' },
            { j: [180, 0, 0], label: 'Upright far' },
            { j: [0, 0, 0], label: 'Home' },
        ];

        async function runIKDemo() {
            if (!ros || !ros.isConnected || !motorsEnabled || demoRunning) return;

            demoRunning = true;
            const demoBtn = document.querySelector('.demo-btn');
            demoBtn.textContent = 'Running...';
            demoBtn.classList.add('running');

            for (let i = 0; i < ikSequence.length; i++) {
                if (!demoRunning) break;  // E-stop was hit

                const pose = ikSequence[i];
                const target = [
                    degToSteps(pose.j[0]),
                    degToSteps(pose.j[1]),
                    degToSteps(pose.j[2])
                ];

                const msg = new ROSLIB.Message({
                    layout: { dim: [], data_offset: 0 },
                    data: target
                });
                goalPub.publish(msg);

                // Optimistic update
                currentPos = target;
                document.getElementById('pos-0').textContent = target[0];
                document.getElementById('pos-1').textContent = target[1];
                document.getElementById('pos-2').textContent = target[2];
                updateDegreeDisplay();

                // Wait for move to complete (estimate based on max delta)
                const maxDelta = Math.max(
                    Math.abs(target[0] - (i > 0 ? degToSteps(ikSequence[i-1].j[0]) : 0)),
                    Math.abs(target[1] - (i > 0 ? degToSteps(ikSequence[i-1].j[1]) : 0)),
                    Math.abs(target[2] - (i > 0 ? degToSteps(ikSequence[i-1].j[2]) : 0))
                );
                const moveTime = (maxDelta * 150 * 2) / 1000000;  // seconds
                await new Promise(r => setTimeout(r, (moveTime + 0.8) * 1000));
            }

            demoRunning = false;
            demoBtn.textContent = 'Run IK Demo';
            demoBtn.classList.remove('running');
        }

        // Auto-connect on load
        window.addEventListener('load', connect);
    </script>
</body>
</html>
