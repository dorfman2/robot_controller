; PlatformIO configuration for RAMPS 1.4 stepper controller
; Board: Arduino Mega 2560 with RAMPS 1.4 shield
; Purpose: Controls 3 stepper motors (joints 0, 1, 2) via rosserial

[env:megaatmega2560]
platform = atmelavr
board = megaatmega2560
framework = arduino

; Serial baud rate for rosserial communication
monitor_speed = 115200

; rosserial dependency
lib_deps =
    frankjoshua/Rosserial Arduino Library@^0.9.1

; Build flags
build_flags =
    -D USE_USBCON
