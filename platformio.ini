; PlatformIO Project Configuration File
; Armold - Six-Axis Robot Arm Controller
;
; Board environments:
;   ramps    - RAMPS 1.4 shield on Arduino Mega 2560 (stepper motors, joints 0-2)
;   opencm   - OpenCM 9.04 (Dynamixel servos, joints 3-5 + gripper)
;
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = ramps

; --- Shared settings ---
[common]
monitor_speed = 115200
framework = arduino

; --- RAMPS 1.4 (Arduino Mega 2560) ---
; Controls stepper motors for joints 0, 1, 2
; RAMPS 1.4 is a shield on top of Arduino Mega 2560
[env:ramps]
platform = atmelavr
board = megaatmega2560
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
upload_port = /dev/cu.usbserial-AL03LVPB
monitor_port = /dev/cu.usbserial-AL03LVPB
build_src_filter = -<*> +<../firmware/ramps/src/>
lib_deps =
    arduino-libraries/Stepper@^1.1.3
    teemuatlut/TMCStepper@^0.7.3

; --- Einsy RAMBo 1.1a (ATmega2560 + TMC2130 SPI) ---
; Controls stepper motors for joints 0-3 via onboard TMC2130 drivers
; SPI-controlled: current, microstepping, StallGuard sensorless homing
; 4 axes: X=Joint0, Y=Joint1, Z=Joint2, E=Joint3
[env:einsy]
platform = atmelavr
board = megaatmega2560
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
upload_port = /dev/armold_einsy
monitor_port = /dev/armold_einsy
build_src_filter = -<*> +<../firmware/einsy/src/>
lib_deps =
    teemuatlut/TMCStepper@^0.7.3
    SPI

; --- OpenCM 9.04 (Robotis, STM32F103) ---
; Controls Dynamixel XL430-W250 (joints 3, 4) and XL-320 (joint 5 + gripper)
;
; NOTE: OpenCM 9.04 does not have first-class PlatformIO board support.
; This env uses the generic STM32F103CB (same MCU as OpenCM 9.04) with
; the Arduino framework. For full Dynamixel library support, you may
; prefer using the Arduino IDE with the Robotis board package:
;   https://raw.githubusercontent.com/ROBOTIS-GIT/OpenCM9.04/master/arduino/opencm_release/package_opencm9.04_index.json
;
[env:opencm]
platform = ststm32
board = genericSTM32F103CB
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
upload_port = /dev/ttyACM0
upload_protocol = dfu
build_src_filter = -<*> +<../firmware/opencm/src/>
lib_deps =
    ROBOTIS-GIT/Dynamixel2Arduino@^0.7.0
